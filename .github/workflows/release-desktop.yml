name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  K2_BUILD_LOG_LEVEL: debug  # debug for beta phase; change to info for production

jobs:
  # --- Test gates: 3 parallel jobs, all must pass before release ---

  test-webapp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Version consistency check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "Versions consistent: $PKG_VERSION"
      - name: Webapp tests (vitest)
        run: yarn test
        working-directory: webapp

  test-cargo:
    runs-on: macos-latest
    timeout-minutes: 10
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.6
      - name: Verify sccache works
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-
      - name: Create sidecar placeholder for cargo test
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}"
      - name: Cargo test (Tauri)
        run: cargo test
        working-directory: desktop/src-tauri

  test-go:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}
      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum
      - name: Go test k2 core (skip slow benchmarks)
        run: go test -short -count=1 -timeout=180s ./...
        working-directory: k2
      - name: Go build k2 (deadlock_disable — production mode)
        run: go build -tags=deadlock_disable ./...
        working-directory: k2

      - name: Notify Slack on test failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh test-failure \
            --platform "Release Desktop" \
            --error "Test gate failed — release build blocked. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

  release:
    needs: [test-webapp, test-cargo, test-go]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: universal-apple-darwin
            platform: macOS
          - runner: [self-hosted, macOS, ARM64]
            target: x86_64-pc-windows-msvc
            platform: Windows
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: Linux

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        if: matrix.platform == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Verify tools (self-hosted macOS)
        if: matrix.platform == 'Windows'
        run: |
          # Ensure Go is on PATH (self-hosted runner)
          export PATH="/usr/local/go/bin:$PATH"
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "Node: $(node -v)"
          echo "Yarn: $(yarn -v)"
          echo "Go:   $(go version)"
          echo "Rust: $(rustup show active-toolchain)"
          command -v cargo-xwin || { echo "ERROR: cargo-xwin not found"; exit 1; }
          command -v makensis || { echo "ERROR: makensis (NSIS) not found"; exit 1; }
          command -v osslsigncode || { echo "ERROR: osslsigncode not found"; exit 1; }

      - name: Install Linux system dependencies
        if: matrix.platform == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup Go
        if: matrix.platform == 'macOS'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust (macOS)
        if: matrix.platform == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Verify Rust Windows target (self-hosted)
        if: matrix.platform == 'Windows'
        run: |
          rustup target list --installed | grep -q x86_64-pc-windows-msvc || {
            echo "Adding x86_64-pc-windows-msvc target..."
            rustup target add x86_64-pc-windows-msvc
          }

      - name: Setup Node.js (Linux)
        if: matrix.platform == 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go (Linux)
        if: matrix.platform == 'Linux'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust (Linux)
        if: matrix.platform == 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache (Linux)
        if: matrix.platform == 'Linux'
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works (Linux)
        if: matrix.platform == 'Linux'
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry (Linux)
        if: matrix.platform == 'Linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-Linux-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-Linux-

      - name: Setup sccache
        if: matrix.platform == 'macOS'
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works (macOS)
        if: matrix.platform == 'macOS'
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry
        if: matrix.platform == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 4

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag and package.json version match: $TAG_VERSION"

      # --- macOS: code signing certificate import ---

      - name: Import Apple code signing certificate
        if: matrix.platform == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # --- macOS: full build via shared script ---

      - name: Build macOS (k2 + tauri + pkg)
        if: matrix.platform == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-macos.sh

      # --- Windows: cross-compile on macOS via cargo-xwin + osslsigncode ---

      - name: SimplySign PKCS#11 login
        if: matrix.platform == 'Windows'
        env:
          SIMPLISIGN_TOTP_URI: ${{ secrets.SIMPLISIGN_TOTP_URI }}
        run: bash scripts/ci/macos/simplisign-login.sh

      - name: Build Windows (k2 + webapp + cargo-xwin + NSIS + Authenticode)
        if: matrix.platform == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows

      - name: Build Linux (k2 + webapp + AppImage)
        if: matrix.platform == 'Linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-linux

      # --- Upload artifacts to S3 ---

      - name: Upload macOS to S3
        if: matrix.platform == 'macOS'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          S3_BASE="s3://d0.all7.cc/kaitu/desktop/${VERSION}"
          aws s3 cp release/${VERSION}/ "${S3_BASE}/" --recursive

      - name: Upload Windows to S3
        if: matrix.platform == 'Windows'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          S3_BASE="s3://d0.all7.cc/kaitu/desktop/${VERSION}"
          aws s3 cp "release/${VERSION}/" "${S3_BASE}/" --recursive \
            --exclude "*" \
            --include "*.exe" --include "*.exe.sig"

      - name: Upload Linux to S3
        if: matrix.platform == 'Linux'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          S3_BASE="s3://d0.all7.cc/kaitu/desktop/${VERSION}"
          # Upload AppImage + signature
          aws s3 cp "release/${VERSION}/" "${S3_BASE}/" --recursive \
            --exclude "*" \
            --include "*.AppImage" --include "*.AppImage.sig"
          # Upload k2 binary alongside AppImage (used by install-linux.sh)
          aws s3 cp "desktop/src-tauri/binaries/k2-x86_64-unknown-linux-gnu" \
            "${S3_BASE}/k2-linux-amd64"

      - name: Invalidate CloudFront CDN cache
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/kaitu/desktop/${VERSION}/*"

      # --- Cleanup ---

      - name: Clean up keychain
        if: matrix.platform == 'macOS' && always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      # --- Notifications ---

      - name: Notify Slack on build success
        if: success()
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CDN_BASE="https://dl.kaitu.io/kaitu/desktop/${VERSION}"

          if [ "${PLATFORM}" = "macOS" ]; then
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_universal.pkg|macOS PKG>"
          elif [ "${PLATFORM}" = "Linux" ]; then
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_amd64.AppImage|Linux AppImage>"
          else
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_x64.exe|Windows Setup>"
          fi

          ./scripts/ci/notify-slack.sh deploy-success \
            --version "${VERSION}" \
            --platforms "${PLATFORM}" \
            --download-url "${DOWNLOAD_URL}"
        env:
          SLACK_WEBHOOK_RELEASE: ${{ secrets.SLACK_WEBHOOK_RELEASE }}
          PLATFORM: ${{ matrix.platform }}

      - name: Notify Slack on build failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "${{ matrix.platform }}" \
            --error "Release build failed on ${{ matrix.platform }}. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

  # --- Catch-all: notify on infrastructure failures (runner offline, DNS, etc.) ---
  # Runs on GitHub-hosted runner so it works even when self-hosted runner is down.
  notify-infra-failure:
    needs: [release]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify Slack on release infrastructure failure
        shell: bash
        run: |
          WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          PAYLOAD=$(cat <<EOF
          {
            "text": "🛑 Release Desktop failed (infrastructure)",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🛑 Release Desktop Infrastructure Failure"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "One or more release jobs failed — possibly runner offline, DNS failure, or network issue.\n*Commit:* \`${COMMIT_SHORT}\` | *Triggered by:* ${GITHUB_ACTOR}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Workflow Run"
                    },
                    "url": "${WORKFLOW_URL}",
                    "style": "danger"
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            --silent --show-error --fail
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_RELEASE }}
