name: Release Desktop

on:
  push:
    # Listen to all v* tags; job-level `if` decides whether to actually run.
    # No blacklist: new platform/suffix added elsewhere never breaks this file.
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # Production releases ship at info level. Debug logs leak token-bearing
  # URLs and engine internals into S3-uploaded log files. For local debug
  # builds, override via `make build-* K2_BUILD_LOG_LEVEL=debug`. Runtime
  # SetLogLevel() still works regardless.
  K2_BUILD_LOG_LEVEL: info

jobs:
  # --- Plan: decide which desktop platforms (if any) this run targets ---
  #
  # Single source of truth for "does this tag belong to me, and if so, which
  # matrix entries should I build". Bare v* (no suffix) → all three; -desktop
  # → all three; -windows/-macos/-linux → just that one; anything else → none
  # (workflow-skipped, no false-positive failure).
  #
  # The dynamic matrix output is consumed verbatim by the `release` job. We
  # use dynamic matrix instead of a job-level `if: ... matrix.X ...` because
  # GHA does NOT expose the `matrix` context to job-level `if` expressions.

  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      should_run: ${{ steps.set.outputs.should_run }}
    steps:
      - id: set
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu
          # Each desktop platform entry as JSON. Keep in sync with the
          # release-job-step expectations (matrix.runner / target / platform).
          MAC='{"runner":"macos-latest","target":"universal-apple-darwin","platform":"macOS"}'
          WIN='{"runner":["self-hosted","macOS","ARM64"],"target":"x86_64-pc-windows-msvc","platform":"Windows"}'
          LIN='{"runner":"macos-latest","target":"linux-amd64","platform":"Linux"}'

          INCLUDE=()
          if [[ "$EVENT_NAME" != "push" ]] || [[ "$TAG_NAME" != *-* ]] || [[ "$TAG_NAME" == *-desktop ]]; then
            INCLUDE=("$MAC" "$WIN" "$LIN")
          elif [[ "$TAG_NAME" == *-macos ]]; then
            INCLUDE=("$MAC")
          elif [[ "$TAG_NAME" == *-windows ]]; then
            INCLUDE=("$WIN")
          elif [[ "$TAG_NAME" == *-linux ]]; then
            INCLUDE=("$LIN")
          fi

          if [[ ${#INCLUDE[@]} -eq 0 ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG_NAME is not a desktop release tag — skipping"
          else
            JOINED=$(IFS=, ; echo "${INCLUDE[*]}")
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[$JOINED]}" >> "$GITHUB_OUTPUT"
          fi

  # --- Test gates: 3 parallel jobs, all must pass before release ---

  test-webapp:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - name: Version consistency check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "Versions consistent: $PKG_VERSION"
      - name: Webapp tests (vitest)
        run: yarn test
        working-directory: webapp

  test-cargo:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: macos-latest
    timeout-minutes: 10
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.6
      - name: Verify sccache works
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-
      - name: Create sidecar placeholder for cargo test
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}"
      - name: Cargo test (Tauri)
        run: cargo test
        working-directory: desktop/src-tauri

  test-go:
    needs: plan
    if: needs.plan.outputs.should_run == 'true'
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}
      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum
      - name: Go test k2 core (skip slow benchmarks)
        run: go test -short -count=1 -timeout=180s ./...
        working-directory: k2
      - name: Go build k2 (deadlock_disable — production mode)
        run: go build -tags=deadlock_disable ./...
        working-directory: k2

      # Guards against regressions like the v0.4.1 missing-initdScript
      # constant that broke the Linux build — caught here in the test
      # gate before the release matrix. nowebapp mirrors the headless
      # path some call sites still use. Covers both shipping architectures
      # (amd64 + arm64) so an arm64-only compile error fails fast here
      # instead of leaking into the release job. CGO_ENABLED=0 means no
      # cross-toolchain is required.
      - name: Linux cross-compile smoke (cmd/k2, nowebapp + default, amd64 + arm64)
        run: |
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch CGO_ENABLED=0 go build -tags nowebapp ./cmd/k2
            GOOS=linux GOARCH=$arch CGO_ENABLED=0 go build ./cmd/k2
          done
        working-directory: k2

      - name: Notify Slack on test failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh test-failure \
            --platform "Release Desktop" \
            --error "Test gate failed — release build blocked. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

  release:
    # Matrix is produced by `plan` — it already contains only the platforms
    # this tag targets. No further filtering needed here.
    #
    # Linux ships a single Go binary with the React webapp embedded (no
    # Tauri). Cross-compile from macOS via CGO_ENABLED=0 — much faster than
    # Linux runners because no apt, no webkit2gtk, no Rust. See
    # packaging/linux/ for the install.sh + systemd unit.
    needs: [plan, test-webapp, test-cargo, test-go]
    if: needs.plan.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        # Both macOS (Tauri bundle) and Linux (Go embed) need yarn for
        # the webapp build. Windows uses its self-hosted tooling.
        if: matrix.platform == 'macOS' || matrix.platform == 'Linux'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Verify tools (self-hosted macOS)
        if: matrix.platform == 'Windows'
        run: |
          # Ensure Go is on PATH (self-hosted runner)
          export PATH="/usr/local/go/bin:$PATH"
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"
          echo "Node: $(node -v)"
          echo "Yarn: $(yarn -v)"
          echo "Go:   $(go version)"
          echo "Rust: $(rustup show active-toolchain)"
          command -v cargo-xwin || { echo "ERROR: cargo-xwin not found"; exit 1; }
          command -v makensis || { echo "ERROR: makensis (NSIS) not found"; exit 1; }
          command -v osslsigncode || { echo "ERROR: osslsigncode not found"; exit 1; }

      - name: Setup Go
        # macOS (Tauri sidecar) and Linux (pure Go binary, CGO=0) need Go.
        if: matrix.platform == 'macOS' || matrix.platform == 'Linux'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust (macOS)
        if: matrix.platform == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Verify Rust Windows target (self-hosted)
        if: matrix.platform == 'Windows'
        run: |
          rustup target list --installed | grep -q x86_64-pc-windows-msvc || {
            echo "Adding x86_64-pc-windows-msvc target..."
            rustup target add x86_64-pc-windows-msvc
          }

      - name: Setup sccache
        if: matrix.platform == 'macOS'
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works (macOS)
        if: matrix.platform == 'macOS'
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry
        if: matrix.platform == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 4

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip only the suffixes this workflow owns. The job-level `if`
          # already guarantees we only run on bare / -windows / -macos /
          # -linux / -desktop tags.
          TAG_VERSION="${TAG_VERSION%-desktop}"
          TAG_VERSION="${TAG_VERSION%-windows}"
          TAG_VERSION="${TAG_VERSION%-macos}"
          TAG_VERSION="${TAG_VERSION%-linux}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag and package.json version match: $TAG_VERSION"

      # --- macOS: code signing certificate import ---

      - name: Import Apple code signing certificate
        if: matrix.platform == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # --- macOS: full build via shared script ---

      - name: Build macOS (k2 + tauri + pkg)
        if: matrix.platform == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-macos.sh

      # --- Windows: cross-compile on macOS via cargo-xwin + osslsigncode ---

      - name: SimplySign PKCS#11 login
        if: matrix.platform == 'Windows'
        env:
          SIMPLISIGN_TOTP_URI: ${{ secrets.SIMPLISIGN_TOTP_URI }}
        run: bash scripts/ci/macos/simplisign-login.sh

      - name: Build Windows (k2 + webapp + cargo-xwin + NSIS + Authenticode)
        if: matrix.platform == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows

      - name: Build Linux (k2 + embedded webapp + tarball)
        if: matrix.platform == 'Linux'
        # Cross-compiles on the macos-latest runner via CGO_ENABLED=0.
        # Produces release/$VERSION/Kaitu_$VERSION_linux_amd64.tar.gz
        # containing k2, install.sh, uninstall.sh, kaitu.service, and a
        # raw release/$VERSION/k2-linux-amd64 binary.
        run: make build-linux

      - name: Install minisign (Linux)
        if: matrix.platform == 'Linux'
        # Runner is macOS, so install via Homebrew. jedisct1/minisign is
        # the standard formula.
        run: brew install minisign

      - name: Sign Linux tarballs (amd64 + arm64)
        if: matrix.platform == 'Linux'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          # Decode Tauri's base64-encoded minisign private key (shared
          # across platforms — same key that signs macOS app.tar.gz).
          echo "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > /tmp/minisign.key
          for ARCH in amd64 arm64; do
            TARBALL="release/${VERSION}/Kaitu_${VERSION}_linux_${ARCH}.tar.gz"
            echo "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | minisign -S -s /tmp/minisign.key -m "${TARBALL}"
            # Base64-encode the .minisig file to match Tauri's .sig format
            # (latest.json stores signatures as base64; raw minisign is
            # multi-line text).
            base64 < "${TARBALL}.minisig" | tr -d '\n' > "${TARBALL}.sig"
            rm -f "${TARBALL}.minisig"
          done
          rm -f /tmp/minisign.key

      # --- Upload artifacts to S3 + CDN invalidation ---

      - name: Upload to S3 + invalidate CDN
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          PLATFORM_FLAG=""
          case "${{ matrix.platform }}" in
            macOS)   PLATFORM_FLAG="--macos" ;;
            Windows) PLATFORM_FLAG="--windows" ;;
            Linux)   PLATFORM_FLAG="--linux" ;;
          esac
          bash scripts/ci/upload-release.sh $PLATFORM_FLAG

      # --- Cleanup ---

      - name: Clean up keychain
        if: matrix.platform == 'macOS' && always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      # --- Notifications ---

      - name: Notify Slack on build success
        if: success()
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CDN_BASE="https://dl.kaitu.io/kaitu/desktop/${VERSION}"

          if [ "${PLATFORM}" = "macOS" ]; then
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_universal.pkg|macOS PKG>"
          elif [ "${PLATFORM}" = "Linux" ]; then
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_linux_amd64.tar.gz|Linux amd64> · <${CDN_BASE}/Kaitu_${VERSION}_linux_arm64.tar.gz|arm64>"
          else
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_x64.exe|Windows Setup>"
          fi

          ./scripts/ci/notify-slack.sh deploy-success \
            --version "${VERSION}" \
            --platforms "${PLATFORM}" \
            --download-url "${DOWNLOAD_URL}"
        env:
          SLACK_WEBHOOK_RELEASE: ${{ secrets.SLACK_WEBHOOK_RELEASE }}
          PLATFORM: ${{ matrix.platform }}

      - name: Notify Slack on build failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "${{ matrix.platform }}" \
            --error "Release build failed on ${{ matrix.platform }}. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

  # --- Catch-all: notify on infrastructure failures (runner offline, DNS, etc.) ---
  # Runs on GitHub-hosted runner so it works even when self-hosted runner is down.
  notify-infra-failure:
    needs: [release]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Notify Slack on release infrastructure failure
        shell: bash
        run: |
          WORKFLOW_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          COMMIT_SHORT="${GITHUB_SHA:0:7}"
          PAYLOAD=$(cat <<EOF
          {
            "text": "🛑 Release Desktop failed (infrastructure)",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "🛑 Release Desktop Infrastructure Failure"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "One or more release jobs failed — possibly runner offline, DNS failure, or network issue.\n*Commit:* \`${COMMIT_SHORT}\` | *Triggered by:* ${GITHUB_ACTOR}"
                }
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {
                      "type": "plain_text",
                      "text": "View Workflow Run"
                    },
                    "url": "${WORKFLOW_URL}",
                    "style": "danger"
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD" \
            --silent --show-error --fail
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_RELEASE }}
