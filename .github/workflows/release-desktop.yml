name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- Test gate: must pass before any build starts ---
  test-gate:
    runs-on: macos-latest
    timeout-minutes: 15
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Version consistency check
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "Versions consistent: $PKG_VERSION"

      - name: Webapp tests (vitest)
        run: yarn test
        working-directory: webapp

      - name: Create sidecar placeholder for cargo test
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}"

      - name: Cargo test (Tauri)
        run: cargo test
        working-directory: desktop/src-tauri

      - name: Go test k2 core (deadlock detection enabled)
        run: go test ./... -count=1 -timeout=120s
        working-directory: k2

      - name: Go build k2 (deadlock_disable — production mode)
        run: go build -tags=deadlock_disable ./...
        working-directory: k2

      # --- Notifications ---

      - name: Notify Slack on test-gate success
        if: success()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh test-success \
            --platform "Release Desktop"
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

      - name: Notify Slack on test-gate failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh test-failure \
            --platform "Release Desktop" \
            --error "Test gate failed — release build blocked. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

  release:
    needs: test-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: universal-apple-darwin
            platform: macOS
          - runner: [self-hosted, Windows]
            target: x86_64-pc-windows-msvc
            platform: Windows

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: ${{ matrix.platform != 'Windows' }}

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        if: matrix.platform == 'macOS'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Node.js (self-hosted)
        if: matrix.platform == 'Windows'
        shell: bash
        run: |
          NODE_VERSION=$(cat .nvmrc)
          CURRENT=$(node -v 2>/dev/null || echo "none")
          if [ "$CURRENT" != "v${NODE_VERSION}" ]; then
            echo "Node $CURRENT -> v${NODE_VERSION}"
            nvm install "$NODE_VERSION"
          fi
          nvm use "$NODE_VERSION"
          NODE_DIR=$(dirname "$(which node)")
          echo "$NODE_DIR" >> "$GITHUB_PATH"
          # Ensure yarn is available
          if ! command -v yarn &>/dev/null; then
            npm install -g yarn
          fi
          NPM_GLOBAL=$(npm prefix -g)
          echo "$NPM_GLOBAL" >> "$GITHUB_PATH"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: ${{ matrix.platform == 'macOS' }}
          cache-dependency-path: k2/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || 'x86_64-pc-windows-msvc' }}

      - name: Setup sccache
        if: matrix.platform == 'macOS'
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works (macOS)
        if: matrix.platform == 'macOS'
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Set persistent cache paths (Windows)
        if: matrix.platform == 'Windows'
        shell: bash
        run: |
          echo "CARGO_HOME=C:/cache/cargo" >> "$GITHUB_ENV"
          echo "GOMODCACHE=C:/cache/gomod" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=C:/cache/sccache" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "C:/cache/cargo/bin" >> "$GITHUB_PATH"

      - name: Setup sccache (Windows local disk)
        if: matrix.platform == 'Windows'
        shell: bash
        run: |
          if ! command -v sccache &>/dev/null; then
            RUSTC_WRAPPER= cargo install sccache --locked
          fi

      - name: Cache cargo registry
        if: matrix.platform == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 4

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag and package.json version match: $TAG_VERSION"

      # --- macOS: code signing certificate import ---

      - name: Import Apple code signing certificate
        if: matrix.platform == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      # --- macOS: full build via shared script ---

      - name: Build macOS (k2 + tauri + pkg)
        if: matrix.platform == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-macos.sh

      # --- Windows: build via Makefile (same as local `make build-windows`) ---

      - name: Build Windows (k2 + webapp + tauri + NSIS)
        if: matrix.platform == 'Windows'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows

      # --- Upload artifacts to S3 ---

      - name: Upload macOS to S3
        if: matrix.platform == 'macOS'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          S3_BASE="s3://d0.all7.cc/kaitu/desktop/${VERSION}"
          aws s3 cp release/${VERSION}/ "${S3_BASE}/" --recursive

      - name: Upload Windows to S3
        if: matrix.platform == 'Windows'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          S3_BASE="s3://d0.all7.cc/kaitu/desktop/${VERSION}"
          NSIS_DIR="desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"

          # Upload signed .exe + .exe.sig (Tauri update signature)
          aws s3 cp "${NSIS_DIR}/" "${S3_BASE}/" --recursive \
            --exclude "*" \
            --include "*.exe" --include "*.exe.sig"

      - name: Invalidate CloudFront CDN cache
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/kaitu/desktop/${VERSION}/*"

      # --- Cleanup ---

      - name: Clean up keychain
        if: matrix.platform == 'macOS' && always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      # --- Notifications ---

      - name: Notify Slack on build success
        if: success()
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CDN_BASE="https://d0.all7.cc/kaitu/desktop/${VERSION}"

          if [ "${PLATFORM}" = "macOS" ]; then
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu-${VERSION}.pkg|macOS PKG>"
          else
            DOWNLOAD_URL="<${CDN_BASE}/Kaitu_${VERSION}_x64-setup.exe|Windows Setup>"
          fi

          ./scripts/ci/notify-slack.sh deploy-success \
            --version "${VERSION}" \
            --platforms "${PLATFORM}" \
            --download-url "${DOWNLOAD_URL}"
        env:
          SLACK_WEBHOOK_RELEASE: ${{ secrets.SLACK_WEBHOOK_RELEASE }}
          PLATFORM: ${{ matrix.platform }}

      - name: Notify Slack on build failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "${{ matrix.platform }}" \
            --error "Release build failed on ${{ matrix.platform }}. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_RELEASE }}
