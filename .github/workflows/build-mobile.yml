name: Build Mobile

on:
  push:
    # Listen to all v* tags; job-level `if` decides whether to actually run.
    # No blacklist: new platform/suffix added elsewhere never breaks this file.
    tags: ['v*']
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both

concurrency:
  group: build-mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Production releases ship at info level. Debug logs leak token-bearing
  # URLs and engine internals into the app sandbox / device-log uploads.
  # For local debug builds, override via `make dev-android K2_BUILD_LOG_LEVEL=debug`.
  # Runtime SetLogLevel() still works regardless.
  K2_BUILD_LOG_LEVEL: info
  # Release builds must embed the full krs.tar.gz, never the cn-baseline
  # placeholder: fetch-rules-embed fails if the CDN archive is unreachable or
  # placeholder-sized. Mechanically enforces the deploy order (k2-rules live
  # first). See Makefile fetch-rules-embed.
  EMBED_REQUIRE_FULL: "1"

jobs:
  test-webapp:
    if: >-
      (github.event_name == 'push' && (!contains(github.ref_name, '-') || endsWith(github.ref_name, '-ios') || endsWith(github.ref_name, '-android'))) ||
      inputs.platform == 'ios' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    uses: ./.github/workflows/test-webapp-reusable.yml

  # Mobile workflow owns only mobile suffixes (-ios, -android). Bare v* (no
  # suffix) means "no filter" → release everything → run both jobs. Any other
  # suffix (e.g. -windows, -k2s) belongs to a different workflow and we skip
  # so we don't false-positive on tags that aren't ours.
  build-ios:
    needs: test-webapp
    if: >-
      (github.event_name == 'push' && (!contains(github.ref_name, '-') || endsWith(github.ref_name, '-ios'))) ||
      inputs.platform == 'ios' ||
      inputs.platform == 'both'
    # macos-26 (Tahoe) ships Xcode 26.x. Apple requires Xcode 26 + iOS 26 SDK
    # for App Store submissions from 2026-04-28. Pinning the runner (instead of
    # macos-latest) makes future Xcode upgrades explicit and reproducible.
    # GitHub-hosted (ephemeral) — no stale-workspace cleanup needed between
    # matrix legs or runs (each gets a fresh VM).
    runs-on: macos-26
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        brand: [kaitu, overleap]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Cache Go tools (gomobile)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: gobin-${{ runner.os }}-gomobile-latest

      - name: Install gomobile
        run: |
          if ! command -v gomobile &>/dev/null; then
            go install golang.org/x/mobile/cmd/gomobile@latest
          fi
          gomobile init

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Resolve brand variables
        id: brand
        run: |
          BRAND="${{ matrix.brand }}"
          case "$BRAND" in
            kaitu) PRODUCT=Kaitu ;;
            overleap) PRODUCT=Overleap ;;
            *) echo "::error::unknown brand $BRAND"; exit 1 ;;
          esac
          VERSION=$(node -p "require('./package.json').version")
          echo "product=$PRODUCT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache gomobile bind output
        # Brand-neutral: k2mobile is protocol-layer, same for both brands, so
        # no matrix.brand in the key — this lets both legs share the cache.
        uses: actions/cache@v4
        with:
          path: k2/build
          key: gomobile-${{ runner.os }}-ios-${{ hashFiles('k2/**/*.go', 'k2/go.sum') }}

      - name: Setup CocoaPods cache
        uses: actions/cache@v4
        with:
          path: mobile/ios/App/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('mobile/ios/App/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Import Apple code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_IOS }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_IOS_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Setup App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY" ]; then
            echo "::error::Secret APP_STORE_CONNECT_API_KEY_BASE64 is not set"
            exit 1
          fi
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip only the suffixes this workflow owns. The job-level `if`
          # already guarantees we only run on bare / -ios / -android tags.
          TAG_VERSION="${TAG_VERSION%-ios}"
          TAG_VERSION="${TAG_VERSION%-android}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Build iOS
        env:
          BRAND: ${{ matrix.brand }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: bash scripts/build-mobile-ios.sh

      - name: Brand purity gate
        run: bash scripts/check-mobile-brand-purity.sh ${{ matrix.brand }} mobile/ios/App/build/App.xcarchive

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive-${{ matrix.brand }}
          path: mobile/ios/App/build/App.xcarchive
          retention-days: 30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ matrix.brand }}
          path: release/*/${{ steps.brand.outputs.product }}-*.ipa
          retention-days: 30

      # overleap has no live App Store listing yet (Phase 0) — altool upload
      # would fail (no App record for io.overleap in ASC). Archive + IPA
      # export above still run for overleap so the build is verified and
      # available as a workflow artifact; only the ASC upload is kaitu-only.
      - name: Upload to App Store Connect
        if: matrix.brand == 'kaitu'
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IPA_PATH="release/${VERSION}/${{ steps.brand.outputs.product }}-${VERSION}.ipa"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      # Web OTA disabled — native/webapp version mismatch caused storage regression (2026-03-22).
      # Webapp is bundled with native builds; OTA updates risk calling native methods that don't exist yet.

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Notify Slack on iOS success
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ matrix.brand }}" = "kaitu" ]; then
            DOWNLOAD_URL="<https://apps.apple.com/app/id6448744655|App Store>"
          else
            DOWNLOAD_URL="(overleap: archived, no public App Store listing yet — Phase 0)"
          fi
          ./scripts/ci/notify-slack.sh deploy-success \
            --version "${VERSION}" \
            --platforms "iOS (${{ matrix.brand }})" \
            --download-url "${DOWNLOAD_URL}"
        env:
          SLACK_WEBHOOK_RELEASE: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

      - name: Notify Slack on iOS failure
        if: failure()
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "iOS (${{ matrix.brand }})" \
            --error "Mobile iOS build failed. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_ALERT }}

  build-android:
    needs: test-webapp
    if: >-
      (github.event_name == 'push' && (!contains(github.ref_name, '-') || endsWith(github.ref_name, '-android'))) ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    # GitHub-hosted (ephemeral) — no stale-workspace cleanup needed between
    # matrix legs or runs (each gets a fresh VM).
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        brand: [kaitu, overleap]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/26.1.10909125
          key: android-ndk-26.1.10909125

      - name: Install Android NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Cache Go tools (gomobile)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: gobin-${{ runner.os }}-gomobile-latest

      - name: Install gomobile
        run: |
          if ! command -v gomobile &>/dev/null; then
            go install golang.org/x/mobile/cmd/gomobile@latest
          fi
          gomobile init
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Resolve brand variables
        id: brand
        run: |
          BRAND="${{ matrix.brand }}"
          case "$BRAND" in
            kaitu) PRODUCT=Kaitu ;;
            overleap) PRODUCT=Overleap ;;
            *) echo "::error::unknown brand $BRAND"; exit 1 ;;
          esac
          VERSION=$(node -p "require('./package.json').version")
          echo "product=$PRODUCT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache gomobile bind output
        # Brand-neutral: k2mobile is protocol-layer, same for both brands, so
        # no matrix.brand in the key — this lets both legs share the cache.
        uses: actions/cache@v4
        with:
          path: k2/build
          key: gomobile-${{ runner.os }}-android-${{ hashFiles('k2/**/*.go', 'k2/go.sum') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip only the suffixes this workflow owns. The job-level `if`
          # already guarantees we only run on bare / -ios / -android tags.
          TAG_VERSION="${TAG_VERSION%-ios}"
          TAG_VERSION="${TAG_VERSION%-android}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Decrypt Android keystore
        env:
          KAITU_ANDROID_STORE_PASSWORD: ${{ secrets.KAITU_ANDROID_STORE_PASSWORD }}
          OVERLEAP_ANDROID_STORE_PASSWORD: ${{ secrets.OVERLEAP_ANDROID_STORE_PASSWORD }}
        run: |
          BRAND="${{ matrix.brand }}"
          if [ "$BRAND" = "overleap" ]; then
            STORE_PASSWORD="$OVERLEAP_ANDROID_STORE_PASSWORD"
          else
            STORE_PASSWORD="$KAITU_ANDROID_STORE_PASSWORD"
          fi
          openssl enc -aes-256-cbc -d -pbkdf2 -iter 100000 \
            -in "mobile/android/app/${BRAND}-release.jks.enc" \
            -out "mobile/android/app/${BRAND}-release.jks" \
            -pass pass:"$STORE_PASSWORD"

      - name: Build Android
        run: bash scripts/build-mobile-android.sh
        env:
          BRAND: ${{ matrix.brand }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          KAITU_ANDROID_STORE_PASSWORD: ${{ secrets.KAITU_ANDROID_STORE_PASSWORD }}
          OVERLEAP_ANDROID_STORE_PASSWORD: ${{ secrets.OVERLEAP_ANDROID_STORE_PASSWORD }}

      - name: Brand purity gate
        # Brand-exact path (not a release/*/*.apk glob): the runner is
        # ephemeral (GitHub-hosted) so there's no stale cross-brand artifact
        # risk here, but the exact path also doubles as a build-output sanity
        # check — if build-mobile-android.sh didn't produce this file, fail
        # loudly instead of the gate silently matching nothing.
        run: |
          APK="release/${{ steps.brand.outputs.version }}/${{ steps.brand.outputs.product }}-${{ steps.brand.outputs.version }}.apk"
          bash scripts/check-mobile-brand-purity.sh ${{ matrix.brand }} "$APK"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.brand }}
          path: release/*/${{ steps.brand.outputs.product }}-*.apk
          retention-days: 30

      - name: Upload Android APK to S3
        env:
          BRAND: ${{ matrix.brand }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: bash scripts/ci/upload-release.sh --android

      - name: Notify Slack on Android success
        if: success()
        run: |
          VERSION=$(node -p "require('./package.json').version")
          CDN_BASE="https://dl.kaitu.io/${{ matrix.brand }}/android"
          ./scripts/ci/notify-slack.sh deploy-success \
            --version "${VERSION}" \
            --platforms "Android (${{ matrix.brand }})" \
            --download-url "<${CDN_BASE}/${VERSION}/${{ steps.brand.outputs.product }}-${VERSION}.apk|Android APK>"
        env:
          SLACK_WEBHOOK_RELEASE: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

      - name: Notify Slack on Android failure
        if: failure()
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "Android (${{ matrix.brand }})" \
            --error "Mobile Android build failed. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_ALERT }}
