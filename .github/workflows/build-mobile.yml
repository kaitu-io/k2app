name: Build Mobile

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - ios
          - android
          - both

concurrency:
  group: build-mobile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-ios:
    if: >-
      github.event_name == 'push' ||
      inputs.platform == 'ios' ||
      inputs.platform == 'both'
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Cache Go tools (gomobile)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: gobin-${{ runner.os }}-gomobile-latest

      - name: Install gomobile
        run: |
          if ! command -v gomobile &>/dev/null; then
            go install golang.org/x/mobile/cmd/gomobile@latest
          fi
          gomobile init

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Cache gomobile bind output
        uses: actions/cache@v4
        with:
          path: k2/build
          key: gomobile-${{ runner.os }}-ios-${{ hashFiles('k2/**/*.go', 'k2/go.sum') }}

      - name: Setup CocoaPods cache
        uses: actions/cache@v4
        with:
          path: mobile/ios/App/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('mobile/ios/App/Podfile.lock') }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Import Apple code signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_IOS }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_IOS_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Setup App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          if [ -z "$APP_STORE_CONNECT_API_KEY" ]; then
            echo "::error::Secret APP_STORE_CONNECT_API_KEY_BASE64 is not set"
            exit 1
          fi
          mkdir -p ~/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Build iOS
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: bash scripts/build-mobile-ios.sh

      - name: Upload iOS archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-archive
          path: mobile/ios/App/build/App.xcarchive
          retention-days: 30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: release/*/Kaitu-*.ipa
          retention-days: 30

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          IPA_PATH="release/${VERSION}/Kaitu-${VERSION}.ipa"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Detect release channel
        id: channel
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-beta"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Release channel: ${CHANNEL} (version: ${VERSION})"

      - name: Upload Web OTA + iOS manifest to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: bash scripts/ci/upload-mobile-s3.sh --web --ios --channel=${{ steps.channel.outputs.channel }}

      - name: Invalidate CloudFront CDN cache
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/kaitu/web/*" "/kaitu/ios/*"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

      - name: Notify Slack on failure
        if: failure()
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "iOS" \
            --error "Mobile iOS build failed. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_ALERT }}

  build-android:
    if: >-
      github.event_name == 'push' ||
      inputs.platform == 'android' ||
      inputs.platform == 'both'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android NDK
        id: ndk-cache
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/26.1.10909125
          key: android-ndk-26.1.10909125

      - name: Install Android NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: sdkmanager --install "ndk;26.1.10909125"

      - name: Cache Go tools (gomobile)
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: gobin-${{ runner.os }}-gomobile-latest

      - name: Install gomobile
        run: |
          if ! command -v gomobile &>/dev/null; then
            go install golang.org/x/mobile/cmd/gomobile@latest
          fi
          gomobile init
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Cache gomobile bind output
        uses: actions/cache@v4
        with:
          path: k2/build
          key: gomobile-${{ runner.os }}-android-${{ hashFiles('k2/**/*.go', 'k2/go.sum') }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Build Android
        run: bash scripts/build-mobile-android.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/*/Kaitu-*.apk
          retention-days: 30

      - name: Detect release channel
        id: channel
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *"-beta"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "Release channel: ${CHANNEL} (version: ${VERSION})"

      - name: Upload Android APK to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: bash scripts/ci/upload-mobile-s3.sh --android --channel=${{ steps.channel.outputs.channel }}

      - name: Invalidate CloudFront CDN cache
        if: success()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/kaitu/android/*"

      - name: Notify Slack on failure
        if: failure()
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "Android" \
            --error "Mobile Android build failed. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_ALERT }}
