name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Platform-independent tests (Ubuntu) ---
  test-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Run webapp tests (vitest)
        run: yarn test
        working-directory: webapp

      - name: Type-check webapp (tsc)
        run: npx tsc --noEmit
        working-directory: webapp

      - name: Type-check K2 Plugin (mobile)
        run: npx tsc --noEmit
        working-directory: mobile/plugins/k2-plugin

  # --- Version consistency checks (Ubuntu) ---
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"

          # Cargo.toml version must match
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "All versions consistent: $PKG_VERSION"

  # --- Platform-dependent tests (macOS) ---
  test-macos:
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Create sidecar placeholder for cargo check
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}"

      - name: Cargo check (Tauri)
        run: cargo check
        working-directory: desktop/src-tauri

      - name: Cargo test (Tauri)
        run: cargo test
        working-directory: desktop/src-tauri

      - name: Go test k2 core
        run: go test ./...
        working-directory: k2

      - name: Go test API (mock-only)
        run: go test ./...
        working-directory: api

  # --- Platform-dependent tests (Windows) ---
  test-windows:
    runs-on: [self-hosted, Windows]
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js (self-hosted)
        shell: bash
        run: |
          NODE_VERSION=$(cat .nvmrc)
          CURRENT=$(node -v 2>/dev/null || echo "none")
          if [ "$CURRENT" != "v${NODE_VERSION}" ]; then
            echo "Node $CURRENT -> v${NODE_VERSION}"
            nvm install "$NODE_VERSION"
          fi
          nvm use "$NODE_VERSION"
          NODE_DIR=$(dirname "$(which node)")
          echo "$NODE_DIR" >> "$GITHUB_PATH"
          # Ensure yarn is available
          if ! command -v yarn &>/dev/null; then
            npm install -g yarn
          fi
          NPM_GLOBAL=$(npm prefix -g)
          echo "$NPM_GLOBAL" >> "$GITHUB_PATH"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false
          cache-dependency-path: k2/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set persistent cache paths (Windows)
        shell: bash
        run: |
          echo "CARGO_HOME=C:/cache/cargo" >> "$GITHUB_ENV"
          echo "GOMODCACHE=C:/cache/gomod" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=C:/cache/sccache" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "C:/cache/cargo/bin" >> "$GITHUB_PATH"

      - name: Setup sccache (Windows local disk)
        shell: bash
        run: |
          if ! command -v sccache &>/dev/null; then
            cargo install sccache --locked
          fi

      - name: Install Node dependencies
        shell: bash
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Run webapp tests (vitest)
        shell: bash
        run: yarn test
        working-directory: webapp

      - name: Type-check webapp (tsc)
        shell: bash
        run: yarn tsc --noEmit
        working-directory: webapp

      - name: Create sidecar placeholder for cargo check
        shell: bash
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}.exe"

      - name: Cargo check (Tauri)
        shell: bash
        run: cargo check
        working-directory: desktop/src-tauri

      - name: Cargo test (Tauri)
        shell: bash
        run: cargo test
        working-directory: desktop/src-tauri

      - name: Go test (k2)
        shell: bash
        run: go test ./sniff/... ./core/... ./engine/... ./config/... ./daemon/... ./provider/... ./cmd/k2/... -count=1 -short
        working-directory: k2

      - name: Build k2 Windows binary
        shell: bash
        run: make build-k2-windows

      - name: Verify k2 binary exists
        shell: bash
        run: test -f desktop/src-tauri/binaries/k2-x86_64-pc-windows-msvc.exe

  # --- Windows build verification (main only) ---
  build-windows:
    runs-on: [self-hosted, Windows]
    needs: test-windows
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js (self-hosted)
        shell: bash
        run: |
          NODE_VERSION=$(cat .nvmrc)
          CURRENT=$(node -v 2>/dev/null || echo "none")
          if [ "$CURRENT" != "v${NODE_VERSION}" ]; then
            nvm install "$NODE_VERSION"
          fi
          nvm use "$NODE_VERSION"
          NODE_DIR=$(dirname "$(which node)")
          echo "$NODE_DIR" >> "$GITHUB_PATH"
          if ! command -v yarn &>/dev/null; then
            npm install -g yarn
          fi
          NPM_GLOBAL=$(npm prefix -g)
          echo "$NPM_GLOBAL" >> "$GITHUB_PATH"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set persistent cache paths (Windows)
        shell: bash
        run: |
          echo "CARGO_HOME=C:/cache/cargo" >> "$GITHUB_ENV"
          echo "GOMODCACHE=C:/cache/gomod" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=C:/cache/sccache" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "C:/cache/cargo/bin" >> "$GITHUB_PATH"

      - name: Setup sccache (Windows local disk)
        shell: bash
        run: |
          if ! command -v sccache &>/dev/null; then
            cargo install sccache --locked
          fi

      - name: Install Node dependencies
        shell: bash
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build Windows installer
        shell: bash
        run: make build-windows

      - name: Verify NSIS installer exists
        shell: bash
        run: ls -la desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Verify k2 binary exists
        shell: bash
        run: test -f desktop/src-tauri/binaries/k2-x86_64-pc-windows-msvc.exe

      - name: Verify version alignment
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$CARGO_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Version mismatch! Cargo.toml ($CARGO_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Versions match."
