name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-webapp:
    uses: ./.github/workflows/test-webapp-reusable.yml

  # web/ had NO CI coverage until now, which meant its brand-leak guards
  # (tests/brand-guard.test.ts, tests/brand-leak-ssr.test.tsx) and the
  # cross-layer contract test were documentation, not gates — they only ran
  # when someone remembered to run them locally.
  # One run covers both brands: web resolves NEXT_PUBLIC_BRAND at call time via
  # siteBrand(), so the tests flip it with vi.stubEnv rather than being baked
  # like webapp's __K2_BRAND__ define.
  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # web/.nvmrc + engines.node >=22
          cache: 'yarn'
          cache-dependency-path: web/yarn.lock

      # web/ is NOT part of the root yarn workspace — it has its own lockfile.
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: web

      # .velite/ is a gitignored build artifact, so it is absent on a fresh
      # checkout; without it every test importing #velite fails to resolve.
      - name: Generate Velite content
        run: npx velite build
        working-directory: web

      - name: Run web tests (vitest)
        run: yarn test
        working-directory: web

  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package.json version: $PKG_VERSION"

          # Cargo.toml version must match
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

          echo "All versions consistent: $PKG_VERSION"

  # --- Platform-dependent tests (Linux — Rust storage crypto platform gate) ---
  test-linux-rust:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Create sidecar placeholder
        run: |
          TRIPLE=$(rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}"

      - name: Install webkit2gtk build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Cargo test (Tauri — Linux platform gate)
        run: cargo test -- --nocapture 2>&1 | tee /tmp/rust-test-output.txt
        working-directory: desktop/src-tauri

      - name: Go test MCP
        run: go test ./... -v 2>&1 | tee /tmp/go-test-output.txt
        working-directory: mcp

      - name: Cross-language hardware ID gate
        run: |
          RUST_HWID=$(grep 'CROSS_LANG_GATE_HWID=' /tmp/rust-test-output.txt | head -1 | cut -d= -f2)
          GO_HWID=$(grep 'CROSS_LANG_GATE_HWID=' /tmp/go-test-output.txt | head -1 | cut -d= -f2)
          echo "Rust hardware ID: $RUST_HWID"
          echo "Go   hardware ID: $GO_HWID"
          if [ -z "$RUST_HWID" ] || [ -z "$GO_HWID" ]; then
            echo "::error::Hardware ID not found in test output"
            exit 1
          fi
          if [ "$RUST_HWID" != "$GO_HWID" ]; then
            echo "::error::Hardware ID mismatch! Rust ($RUST_HWID) != Go ($GO_HWID)"
            exit 1
          fi
          echo "Cross-language hardware ID gate PASSED"

  # --- Platform-dependent tests (macOS) ---
  test-macos:
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Create sidecar placeholder for cargo check
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}"

      - name: Cargo check (Tauri)
        run: cargo check
        working-directory: desktop/src-tauri

      - name: Cargo test (Tauri)
        run: cargo test -- --nocapture 2>&1 | tee /tmp/rust-test-output.txt
        working-directory: desktop/src-tauri

      - name: Go test MCP
        run: go test ./... -v 2>&1 | tee /tmp/go-test-output.txt
        working-directory: mcp

      - name: Cross-language hardware ID gate
        run: |
          RUST_HWID=$(grep 'CROSS_LANG_GATE_HWID=' /tmp/rust-test-output.txt | head -1 | cut -d= -f2)
          GO_HWID=$(grep 'CROSS_LANG_GATE_HWID=' /tmp/go-test-output.txt | head -1 | cut -d= -f2)
          echo "Rust hardware ID: $RUST_HWID"
          echo "Go   hardware ID: $GO_HWID"
          if [ -z "$RUST_HWID" ] || [ -z "$GO_HWID" ]; then
            echo "::error::Hardware ID not found in test output"
            exit 1
          fi
          if [ "$RUST_HWID" != "$GO_HWID" ]; then
            echo "::error::Hardware ID mismatch! Rust ($RUST_HWID) != Go ($GO_HWID)"
            echo "::error::This means encrypted storage written by Tauri cannot be read by MCP"
            exit 1
          fi
          echo "Cross-language hardware ID gate PASSED"

      - name: Go test k2 core (deadlock detection enabled)
        run: go test ./... -count=1 -short -timeout=120s
        working-directory: k2

      - name: Go build k2 (deadlock_disable — production mode)
        run: go build -tags=deadlock_disable ./...
        working-directory: k2

      # -count=1 is load-bearing, not cargo-cult: TestExportContract compares the
      # committed contracts/api-contract.json against live Go values, and that file
      # lives OUTSIDE the api/ module. cmd/go does not stat files outside the module
      # when deciding cache validity, so hand-editing the contract to match drifted
      # code returns `ok (cached)` — the exact move this gate exists to stop. The
      # k2 steps above already carry -count=1 for the same class of reason.
      - name: Go test API (mock-only)
        run: go test ./... -count=1
        working-directory: api

  # --- Gateway (k2r) soft-router UAT — no hardware, runs in CI (Tier 3a) ---
  # The k2/test/k2r-uat Docker harness (lan-client → k2r TPROXY → k2s) exercises
  # the full router data path with no physical router. A real Linux runner has the
  # TPROXY kernel modules Docker Desktop lacks, so K2R_UAT_REQUIRE_DATAPLANE=1
  # turns a missing data plane into a hard failure instead of a silent skip.
  # Also runs the gateway unit tests, which are //go:build linux and therefore
  # run on NO other job (test-macos is darwin → they compile out).
  test-gateway-uat:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Load TPROXY kernel modules
        run: |
          sudo modprobe nf_tables || true
          sudo modprobe nft_tproxy || true
          sudo modprobe xt_TPROXY || true
          sudo modprobe iptable_mangle || true
          sudo modprobe ip6table_mangle || true
          echo "Loaded netfilter/tproxy modules:"
          lsmod | grep -iE 'tproxy|nf_tables|mangle' || echo "(none visible — may be builtin)"

      - name: Gateway unit tests (Linux build tag — run on no other job)
        run: go test ./gateway/... -count=1
        working-directory: k2

      - name: Gateway soft-router UAT (data plane required)
        run: K2R_UAT_REQUIRE_DATAPLANE=1 make gateway-uat
        working-directory: k2

  # --- Platform-dependent tests (Windows) ---
  test-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'yarn'

      - name: Install yarn
        shell: bash
        run: npm install -g yarn

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: k2/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Verify sccache works
        shell: bash
        run: |
          export SCCACHE_GHA_ENABLED=true
          if sccache rustc -vV >/dev/null 2>&1; then
            echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
            echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::sccache GHA backend unavailable, compiling without cache"
          fi

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Install Node dependencies
        shell: bash
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Create sidecar placeholder for cargo check
        shell: bash
        run: |
          TRIPLE=$(RUSTC_WRAPPER= rustc -vV | grep host | cut -d' ' -f2)
          mkdir -p desktop/src-tauri/binaries
          touch "desktop/src-tauri/binaries/k2-${TRIPLE}.exe"

      - name: Cargo check (Tauri)
        shell: bash
        run: cargo check
        working-directory: desktop/src-tauri

      - name: MachineGuid baseline (pre-Rust)
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          echo === reg query (cmd, pre-Rust, native view) ===
          reg query "HKLM\SOFTWARE\Microsoft\Cryptography" /v MachineGuid
          echo === reg query KEY_WOW64_64KEY view ===
          reg query "HKLM\SOFTWARE\Microsoft\Cryptography" /v MachineGuid /reg:64
          echo === reg query KEY_WOW64_32KEY view ===
          reg query "HKLM\SOFTWARE\Microsoft\Cryptography" /v MachineGuid /reg:32
          echo === wmic csproduct UUID ===
          wmic csproduct get UUID

      - name: Cargo test (Tauri)
        shell: bash
        run: cargo test -- --nocapture 2>&1 | tee /tmp/rust-test-output.txt
        working-directory: desktop/src-tauri

      - name: MachineGuid mid-check (post-Rust, pre-Go)
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          echo === reg query (cmd, post-Rust pre-Go) ===
          reg query "HKLM\SOFTWARE\Microsoft\Cryptography" /v MachineGuid

      - name: Go test MCP
        shell: bash
        run: go test ./... -v 2>&1 | tee /tmp/go-test-output.txt
        working-directory: mcp

      - name: MachineGuid post-Go check
        if: runner.os == 'Windows'
        shell: cmd
        continue-on-error: true
        run: |
          echo === reg query (cmd, post-Go) ===
          reg query "HKLM\SOFTWARE\Microsoft\Cryptography" /v MachineGuid

      - name: Cross-language hardware ID gate
        shell: bash
        run: |
          RUST_HWID=$(grep 'CROSS_LANG_GATE_HWID=' /tmp/rust-test-output.txt | head -1 | cut -d= -f2)
          GO_HWID=$(grep 'CROSS_LANG_GATE_HWID=' /tmp/go-test-output.txt | head -1 | cut -d= -f2)
          echo "Rust hardware ID: $RUST_HWID"
          echo "Go   hardware ID: $GO_HWID"
          if [ -z "$RUST_HWID" ] || [ -z "$GO_HWID" ]; then
            echo "::error::Hardware ID not found in test output"
            exit 1
          fi
          if [ "$RUST_HWID" != "$GO_HWID" ]; then
            echo "::error::Hardware ID mismatch! Rust ($RUST_HWID) != Go ($GO_HWID)"
            echo "::error::This means encrypted storage written by Tauri cannot be read by MCP"
            echo "::error::Inspect 'MachineGuid baseline / mid-check / post-Go' steps for ground truth from reg.exe"
            exit 1
          fi
          echo "Cross-language hardware ID gate PASSED"

      - name: Go test (k2, deadlock detection enabled)
        shell: bash
        run: go test ./sniff/... ./core/... ./engine/... ./config/... ./daemon/ ./provider/... -count=1 -short -timeout=120s
        working-directory: k2

      - name: Build k2 Windows binary
        shell: bash
        run: make build-k2-windows

      - name: Verify k2 binary exists
        shell: bash
        run: test -f desktop/src-tauri/binaries/k2-x86_64-pc-windows-msvc.exe

  # --- Windows build verification (main only) ---
  build-windows:
    runs-on: [self-hosted, Windows]
    needs: test-windows
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        shell: bash
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js (self-hosted)
        shell: bash
        run: |
          NODE_VERSION=$(cat .nvmrc)
          CURRENT=$(node -v 2>/dev/null || echo "none")
          if [ "$CURRENT" != "v${NODE_VERSION}" ]; then
            nvm install "$NODE_VERSION"
          fi
          nvm use "$NODE_VERSION"
          NODE_DIR=$(dirname "$(which node)")
          echo "$NODE_DIR" >> "$GITHUB_PATH"
          if ! command -v yarn &>/dev/null; then
            npm install -g yarn
          fi
          NPM_GLOBAL=$(npm prefix -g)
          echo "$NPM_GLOBAL" >> "$GITHUB_PATH"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set persistent cache paths (Windows)
        shell: bash
        run: |
          echo "CARGO_HOME=C:/cache/cargo" >> "$GITHUB_ENV"
          echo "GOMODCACHE=C:/cache/gomod" >> "$GITHUB_ENV"
          echo "SCCACHE_DIR=C:/cache/sccache" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
          echo "C:/cache/cargo/bin" >> "$GITHUB_PATH"

      - name: Setup sccache (Windows local disk)
        shell: bash
        run: |
          if ! command -v sccache &>/dev/null; then
            RUSTC_WRAPPER= cargo install sccache --locked
          fi

      - name: Install Node dependencies
        shell: bash
        run: yarn install --frozen-lockfile --network-timeout 600000

      - name: Build Windows installer
        shell: bash
        run: make build-windows

      - name: Verify NSIS installer exists
        shell: bash
        run: ls -la desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Verify k2 binary exists
        shell: bash
        run: test -f desktop/src-tauri/binaries/k2-x86_64-pc-windows-msvc.exe

      - name: Verify version alignment
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' desktop/src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$CARGO_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Version mismatch! Cargo.toml ($CARGO_VERSION) != package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Versions match."
