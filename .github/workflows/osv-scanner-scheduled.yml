name: OSV-Scanner Scheduled Scan

on:
  schedule:
    # Weekly, Monday 04:12 UTC (off the hour to avoid GHA rush)
    - cron: '12 4 * * 1'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # Full scan, uploads SARIF to GitHub Security tab (Code scanning alerts).
  scan-scheduled:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: |-
        --lockfile=./yarn.lock
        --lockfile=./web/yarn.lock
        --lockfile=./tools/kaitu-center/package-lock.json
