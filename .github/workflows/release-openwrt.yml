name: Release k2r (Router/Gateway)

on:
  push:
    tags:
      - 'v*-k2r'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent for k2 submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: k2/go.sum

      - name: Verify tag matches package.json
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          TAG_VERSION="${TAG_VERSION%-k2r}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag and package.json version match: $TAG_VERSION"

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 4

      - name: Build webapp
        run: cd webapp && yarn build

      - name: Copy webapp dist into k2/gateway
        run: |
          rm -rf k2/gateway/dist
          cp -r webapp/dist k2/gateway/dist

      - name: Cross-compile k2r binaries
        run: |
          VERSION=$(node -p "require('./package.json').version")
          COMMIT=$(cd k2 && git rev-parse --short HEAD)
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT}"
          mkdir -p build

          build_one() {
            arch="$1"; goarm="$2"; name="$3"
            echo "  k2r-linux-${name} (GOARCH=${arch}${goarm:+ GOARM=${goarm}})"
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" GOARM="$goarm" \
              go build -C k2 \
                -tags release \
                -ldflags "$LDFLAGS" \
                -o "../build/k2r-linux-${name}" \
                ./cmd/k2r
          }

          build_one arm64 ""  arm64
          build_one amd64 ""  amd64
          build_one arm   "7" armv7

      - name: Verify binary architectures
        run: |
          for arch in arm64 amd64 armv7; do
            file "build/k2r-linux-${arch}"
          done

      - name: Smoke test binaries via qemu
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support
          for arch in arm64 amd64 armv7; do
            echo "  k2r-linux-${arch}:"
            "build/k2r-linux-${arch}" version
          done

      - name: Generate checksums
        run: |
          cd build
          sha256sum k2r-linux-* > checksums.txt
          cat checksums.txt

      - name: Upload binaries + checksums to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          aws s3 cp build/ "s3://d0.all7.cc/kaitu/k2r/${VERSION}/" \
            --recursive \
            --exclude "*" --include "k2r-linux-*" --include "checksums.txt"

      - name: Publish LATEST and install script
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          VERSION=$(node -p "require('./package.json').version")
          printf '%s' "${VERSION}" > /tmp/LATEST
          aws s3 cp /tmp/LATEST "s3://d0.all7.cc/kaitu/k2r/LATEST" \
            --cache-control "max-age=60" \
            --content-type "text/plain"
          aws s3 cp k2/scripts/install-k2r.sh "s3://d0.all7.cc/kaitu/k2r/install-k2r.sh" \
            --cache-control "max-age=300" \
            --content-type "text/plain"

      - name: Invalidate CloudFront cache
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CDN_DISTRIBUTION_ID }} \
            --paths "/kaitu/k2r/LATEST" "/kaitu/k2r/install-k2r.sh"

      - name: Notify Slack on success
        if: success()
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          ./scripts/ci/notify-slack.sh deploy-success \
            --version "${VERSION}" \
            --platforms "k2r-arm64,k2r-amd64,k2r-armv7"
        env:
          SLACK_WEBHOOK_RELEASE: ${{ secrets.SLACK_WEBHOOK_RELEASE }}

      - name: Notify Slack on failure
        if: failure()
        shell: bash
        run: |
          ./scripts/ci/notify-slack.sh build-failure \
            --platform "k2r" \
            --error "k2r release build failed. Check workflow run for details."
        env:
          SLACK_WEBHOOK_ALERT: ${{ secrets.SLACK_WEBHOOK_ALERT }}
