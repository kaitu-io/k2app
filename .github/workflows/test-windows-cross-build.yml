name: Test Windows Cross-Build on macOS

on:
  push:
    branches:
      - 'fix/windows-build-on-macos'

jobs:
  test-windows-build:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH for private submodule
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.K2_DEPLOY_KEY }}

      - name: Init k2 submodule
        run: git -c url."git@github.com:".insteadOf="https://github.com/" submodule update --init --recursive

      - name: Verify build tools
        run: |
          echo "=== Environment ==="
          echo "Node: $(node -v)"
          echo "Yarn: $(yarn -v)"
          echo "Go:   $(go version)"
          echo "Rust: $(rustup show active-toolchain)"
          echo "=== Cross-build tools ==="
          cargo-xwin --version
          makensis -VERSION
          osslsigncode --version
          echo "=== Rust Windows target ==="
          rustup target list --installed | grep x86_64-pc-windows-msvc
          echo "=== AWS CLI ==="
          aws --version

      - name: Verify Rust Windows target
        run: |
          rustup target list --installed | grep -q x86_64-pc-windows-msvc || {
            echo "Adding x86_64-pc-windows-msvc target..."
            rustup target add x86_64-pc-windows-msvc
          }

      - name: SimplySign PKCS#11 login
        env:
          SIMPLISIGN_TOTP_URI: ${{ secrets.SIMPLISIGN_TOTP_URI }}
        run: bash scripts/ci/macos/simplisign-login.sh

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile --network-timeout 600000 --network-concurrency 4

      - name: Build Windows (full pipeline)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: make build-windows

      - name: Verify artifacts
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "=== Release artifacts ==="
          ls -la "release/${VERSION}/"
          FILE="release/${VERSION}/Kaitu_${VERSION}_x64-setup.exe"
          if [ -f "$FILE" ]; then
            echo "Installer size: $(du -h "$FILE" | cut -f1)"
            echo "SUCCESS: Windows installer built on macOS"
          else
            echo "ERROR: Installer not found at $FILE"
            exit 1
          fi

      - name: Verify Authenticode signature
        run: |
          VERSION=$(node -p "require('./package.json').version")
          FILE="release/${VERSION}/Kaitu_${VERSION}_x64-setup.exe"
          osslsigncode verify "$FILE" 2>&1 | head -20
          # Check signature is present (even if CA chain incomplete on macOS)
          if osslsigncode verify "$FILE" 2>&1 | grep -q "Signature verification"; then
            echo "Authenticode signature present"
          else
            echo "WARNING: Could not verify signature"
          fi
