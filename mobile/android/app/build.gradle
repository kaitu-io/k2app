apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "io.kaitu"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "io.kaitu"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 406
        versionName "0.4.6"
        ndk {
            abiFilters 'arm64-v8a'
        }
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            storeFile file("kaitu-release.jks")
            storePassword System.getenv("KAITU_ANDROID_STORE_PASSWORD") ?: ""
            keyAlias "kaitu"
            keyPassword System.getenv("KAITU_ANDROID_STORE_PASSWORD") ?: ""
        }
    }

    buildTypes {
        debug {
            // Dev builds (cap run android) sign with the production keystore so
            // they install straight over the released io.kaitu app — same
            // signature, no uninstall, no data loss. Falls back to the default
            // debug keystore when KAITU_ANDROID_STORE_PASSWORD isn't set (e.g.
            // CI debug jobs or contributors without the key).
            if (System.getenv("KAITU_ANDROID_STORE_PASSWORD")) {
                signingConfig signingConfigs.release
            }
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    repositories {
        flatDir {
            dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildFeatures {
        buildConfig true
    }

    kotlinOptions {
        jvmTarget = '21'
    }
}

dependencies {
    implementation(name: 'k2mobile', ext: 'aar')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-app')
    implementation project(':capacitor-status-bar')
    implementation project(':k2-plugin')
    implementation project(':capacitor-cordova-android-plugins')

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.json:json:20231013"
}

apply from: 'capacitor.build.gradle'
