apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

android {
    namespace "io.kaitu"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 407
        versionName "0.4.7"
        ndk {
            abiFilters 'arm64-v8a'
        }
        aaptOptions {
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            storeFile file("kaitu-release.jks")
            storePassword System.getenv("KAITU_ANDROID_STORE_PASSWORD") ?: ""
            keyAlias "kaitu"
            keyPassword System.getenv("KAITU_ANDROID_STORE_PASSWORD") ?: ""
        }
        overleap {
            storeFile file("overleap-release.jks")
            storePassword System.getenv("OVERLEAP_ANDROID_STORE_PASSWORD") ?: ""
            keyAlias "overleap"
            keyPassword System.getenv("OVERLEAP_ANDROID_STORE_PASSWORD") ?: ""
        }
    }

    flavorDimensions = ["brand"]
    productFlavors {
        kaitu {
            dimension "brand"
            applicationId "io.kaitu"
            // Unconditional: this is the release-path source of truth. A
            // missing KAITU_ANDROID_STORE_PASSWORD must fail assembleRelease
            // loudly (keystore password error), not silently produce an
            // unsigned APK. Debug variants get their own conditional
            // fallback below, in the androidComponents.onVariants block —
            // don't reintroduce a conditional here.
            signingConfig signingConfigs.release
        }
        overleap {
            dimension "brand"
            applicationId "io.overleap"
            // Unconditional: this is the release-path source of truth. A
            // missing OVERLEAP_ANDROID_STORE_PASSWORD must fail
            // assembleRelease loudly (keystore password error), not
            // silently produce an unsigned APK. Debug variants get their
            // own conditional fallback below, in the
            // androidComponents.onVariants block — don't reintroduce a
            // conditional here.
            signingConfig signingConfigs.overleap
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    repositories {
        flatDir {
            dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildFeatures {
        buildConfig true
    }

    kotlinOptions {
        jvmTarget = '21'
    }
}

// The built-in "debug" buildType comes with an implicit signingConfigs.debug
// default baked in by AGP, and that default takes priority over whatever
// productFlavors{} assigns above (buildType > flavor in AGP's merge order) —
// so the unconditional signingConfig set on each flavor block above (the
// release-path source of truth) never actually reaches debug variants.
// Override it explicitly per (flavor, debug) variant here to restore the
// "sign debug with the flavor's release keystore when its store password is
// available, else fall back to the default debug keystore" behavior for both
// flavors. This block is debug-only — it must never be relied on for release
// signing, and the flavor-level assignments above must stay unconditional.
androidComponents {
    onVariants(selector().withBuildType("debug")) { variant ->
        def isOverleap = variant.flavorName == "overleap"
        def envVar = isOverleap ? "OVERLEAP_ANDROID_STORE_PASSWORD" : "KAITU_ANDROID_STORE_PASSWORD"
        if (System.getenv(envVar)) {
            def configName = isOverleap ? "overleap" : "release"
            variant.signingConfig.setConfig(android.signingConfigs.getByName(configName))
        }
    }
}

dependencies {
    implementation(name: 'k2mobile', ext: 'aar')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-app')
    implementation project(':capacitor-status-bar')
    implementation project(':k2-plugin')
    implementation project(':capacitor-cordova-android-plugins')

    testImplementation "junit:junit:$junitVersion"
    testImplementation "org.json:json:20231013"
}

apply from: 'capacitor.build.gradle'
