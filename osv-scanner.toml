# OSV-Scanner ignore list for known dev-only transitive vulnerabilities.
#
# Every entry MUST have an ignoreUntil date so it auto-expires and forces
# re-evaluation. Default expiry: 6 months from initial entry.
#
# When adding new entries: confirm the vuln is dev-only (eslint chain, build
# tooling, test runner) and document the parent + scope in `reason`. If the
# vuln touches production runtime, fix it instead of ignoring.

# --- eslint 9 / eslint-config-next transitive chain ---
# These ReDoS vulnerabilities live in minimatch / picomatch / brace-expansion /
# ajv used only during `eslint .` runs (CI lint + local dev). They never
# process untrusted user input. Will clear when eslint-config-next refreshes
# its dependency tree.

