version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - rm -rf .next/cache/fetch-cache  # clear stale CDN manifest cache between builds
            # Amplify console env vars live only in the build shell; output: 'standalone'
            # does not forward them to the SSR Lambda. Bake them into .env.production so
            # Next.js bundles them into the standalone output.
            - env | grep -E '^(NEXT_PUBLIC_BRAND|DATABASE_URL|PAYLOAD_SECRET|CENTER_API_URL|CDN_URL|S3_BUCKET|S3_REGION|S3_ACCESS_KEY_ID|S3_SECRET_ACCESS_KEY|TRANSLATOR_API_KEY|TRANSLATOR_BASE_URL|TRANSLATOR_MODEL|NEXT_PUBLIC_SENTRY_DSN|SENTRY_ORG|SENTRY_PROJECT|SENTRY_AUTH_TOKEN)=' >> .env.production
            - yarn install
        build:
          commands:
            # Payload schema is managed via explicit migrations in src/migrations/.
            # `push: true` does NOT auto-sync at runtime in serverless — that assumption
            # caused a prod outage where /manager/cms returned blank pages because the
            # admins table was never created. Run migrations manually after merging
            # schema changes:
            #   cd web && PAYLOAD_SECRET=<...> DATABASE_URL=<prod> yarn payload migrate
            # Build does not invoke `payload migrate` here because the
            # @payload-enchants/translator package has an ESM dir-import bug that crashes
            # the payload CLI on Node 22 (works inside Next.js bundler — only raw CLI fails).
            # Required env vars (set via Amplify console):
            #   DATABASE_URL, PAYLOAD_SECRET,
            #   TRANSLATOR_API_KEY, TRANSLATOR_BASE_URL, TRANSLATOR_MODEL,
            #   CENTER_API_URL,
            #   S3_BUCKET, S3_REGION, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, CDN_URL,
            #   NEXT_PUBLIC_SENTRY_DSN, SENTRY_ORG, SENTRY_PROJECT, SENTRY_AUTH_TOKEN.
            #
            #   NEXT_PUBLIC_BRAND=kaitu|overleap — the baked deployment brand.
            #   Unset defaults to kaitu (zero-breakage). The overleap Amplify app
            #   MUST set NEXT_PUBLIC_BRAND=overleap. One repo, two Amplify apps.
            - echo "Building Next.js application..."
            - yarn run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .next/cache/**/*
          - node_modules/**/*
    appRoot: web
