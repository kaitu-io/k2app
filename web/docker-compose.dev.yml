services:
  postgres:
    image: postgres:16-alpine
    container_name: kaitu-cms-postgres
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: kaitu_cms
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U payload -d kaitu_cms']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
