# Kaitu k2s Docker Compose
# Architecture:
# - k2-sidecar: registration, config generation (bridge network)
# - k2s: Go k2s tunnel with ECH front door (bridge network, Docker port mapping)
#
# Traffic Flow:
# - Internet :443 (TCP+UDP) -> Docker port mapping -> k2s:443
#   - ECH present -> k2s handler (in-process QUIC+TCP-WS with ECH camouflage)
#   - Unknown SNI -> camouflage reverse proxy to real site
# - Internet :40000-40019 (UDP hop ports) -> Docker port mapping -> k2s:443

# Project name — pins the compose project identity to "k2s" independent of the
# host deploy directory. Without this, the project name defaults to the deploy
# dir basename (e.g. /apps/k2s -> project k2s), so renaming the dir would orphan
# the named volumes (k2s_config / k2s_k2v5-data) and collide on container_name.
# Pinning it here decouples project identity from the directory.
name: k2s

networks:
  k2-internal:
    driver: bridge

volumes:
  config:      # Shared config volume for certificates and configs
  k2v5-data:   # k2v5 writable data (connect-url.txt, self-signed certs)

services:
  # K2 Sidecar - Central management service (bridge network)
  # Generates config files and certificates into the shared config volume.
  k2-sidecar:
    image: public.ecr.aws/d6n9t2r2/k2-sidecar:${K2_VERSION:-latest}
    container_name: k2-sidecar
    restart: unless-stopped
    networks:
      - k2-internal
    volumes:
      - config:/etc/kaitu
      - k2v5-data:/etc/k2v5:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Singapore
      - K2_NODE_SECRET=${K2_NODE_SECRET}
      - K2_PRIVATE_CLAIM=${K2_PRIVATE_CLAIM:-}
      - K2_CENTER_URL=${K2_CENTER_URL:-https://k2.52j.me}
      - K2_DOMAIN=${K2_DOMAIN:-}
      - K2_NODE_NAME=${K2_NODE_NAME:-}
      - K2_NODE_REGION=${K2_NODE_REGION:-}
      - K2_IP_TYPE=${K2_IP_TYPE:-unknown}
      - K2_LOG_LEVEL=${K2_LOG_LEVEL:-info}
      - REPORT_INTERVAL=${REPORT_INTERVAL:-120s}
      - K2_NODE_BILLING_START_DATE=${K2_NODE_BILLING_START_DATE:-}
      - K2_NODE_TRAFFIC_LIMIT_GB=${K2_NODE_TRAFFIC_LIMIT_GB:-0}
      - K2_NODE_TRAFFIC_USED_GB=${K2_NODE_TRAFFIC_USED_GB:-0}
      - K2_TEST_NODE=${K2_TEST_NODE:-false}
      - K2_HAS_RELAY=${K2_HAS_RELAY:-false}
      - K2_JUMP_PORT_MIN=${K2_JUMP_PORT_MIN:-40000}
      - K2_JUMP_PORT_MAX=${K2_JUMP_PORT_MAX:-40019}
      - K2_NODE_ARCH=${K2_NODE_ARCH:-k2v5}
      - K2_CUTOFF_POLL_INTERVAL=${K2_CUTOFF_POLL_INTERVAL:-5s}
    healthcheck:
      test: ["CMD", "test", "-f", "/etc/kaitu/.ready"]
      interval: 2s
      timeout: 1s
      retries: 60
      start_period: 5s

  # k2s - Go k2s tunnel with ECH front door (bridge network)
  # Docker port mapping handles: 443 TCP+UDP + hop ports 40000-40019 UDP -> container 443
  # Routes based on ECH and SNI:
  # - ECH present: k2s protocol handled locally (QUIC on UDP 443, TCP-WS on TCP 443)
  # - Unknown SNI: camouflage reverse proxy to real site
  k2s:
    image: public.ecr.aws/d6n9t2r2/k2s:${K2_VERSION:-latest}
    container_name: k2s
    restart: unless-stopped
    networks:
      - k2-internal
    depends_on:
      k2-sidecar:
        condition: service_healthy
    ports:
      - "443:443/tcp"
      - "443:443/udp"
      - "40000:443/udp"
      - "40001:443/udp"
      - "40002:443/udp"
      - "40003:443/udp"
      - "40004:443/udp"
      - "40005:443/udp"
      - "40006:443/udp"
      - "40007:443/udp"
      - "40008:443/udp"
      - "40009:443/udp"
      - "40010:443/udp"
      - "40011:443/udp"
      - "40012:443/udp"
      - "40013:443/udp"
      - "40014:443/udp"
      - "40015:443/udp"
      - "40016:443/udp"
      - "40017:443/udp"
      - "40018:443/udp"
      - "40019:443/udp"
    volumes:
      - config:/etc/kaitu:ro
      - k2v5-data:/etc/k2v5
      - ./users:/etc/k2v5/users
      - ./logs:/var/log/kaitu
    environment:
      - TZ=Asia/Singapore
      - K2_LOG_LEVEL=${K2V5_LOG_LEVEL:-info}
    logging:
      driver: journald
      options:
        tag: k2s

