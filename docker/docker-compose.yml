# Kaitu k2v5 Docker Compose
# Architecture:
# - k2-sidecar: registration, config generation, RADIUS proxy (bridge network)
# - k2v5: Go k2v5 tunnel with ECH front door (bridge network, Docker port mapping)
# - k2v4-slave: k2v4 TCP-WS tunnel (bridge network, behind k2v5)
# - k2-oc: OpenConnect tunnel (bridge network for sysctls)
#
# Traffic Flow:
# - Internet :443 (TCP+UDP) -> Docker port mapping -> k2v5:443
#   - ECH present -> k2v5 handler (in-process QUIC+TCP-WS with ECH camouflage)
#   - No ECH, SNI match -> TCP relay to k2v4-slave:443 or k2-oc:443 (Docker internal DNS)
#   - Unknown SNI -> camouflage reverse proxy
# - Internet :40000-40019 (UDP hop ports) -> Docker port mapping -> k2v5:443

networks:
  k2-internal:
    driver: bridge

volumes:
  config:      # Shared config volume for certificates and configs
  k2v5-data:   # k2v5 writable data (connect-url.txt, self-signed certs)

services:
  # K2 Sidecar - Central management service (bridge network)
  # Generates config files and certificates into the shared config volume.
  # Provides RADIUS proxy for k2-oc authentication.
  k2-sidecar:
    image: public.ecr.aws/d6n9t2r2/k2-sidecar:latest
    container_name: k2-sidecar
    restart: unless-stopped
    networks:
      - k2-internal
    volumes:
      - config:/etc/kaitu
      - config:/etc/ocserv
      - k2v5-data:/etc/k2v5:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - TZ=Asia/Singapore
      - K2_NODE_SECRET=${K2_NODE_SECRET}
      - K2_CENTER_URL=${K2_CENTER_URL:-https://k2.52j.me}
      - K2_DOMAIN=${K2_DOMAIN:-}
      - K2V4_HOST=k2v4-slave
      - K2V4_PORT=443
      - K2OC_DOMAIN=${K2OC_DOMAIN:-}
      - K2OC_HOST=k2-oc
      - K2OC_PORT=443
      - K2OC_ENABLED=${K2OC_ENABLED:-false}
      - K2_NODE_NAME=${K2_NODE_NAME:-}
      - K2_NODE_REGION=${K2_NODE_REGION:-}
      - K2_LOG_LEVEL=${K2_LOG_LEVEL:-info}
      - REPORT_INTERVAL=${REPORT_INTERVAL:-120s}
      - K2_NODE_BILLING_START_DATE=${K2_NODE_BILLING_START_DATE:-}
      - K2_NODE_TRAFFIC_LIMIT_GB=${K2_NODE_TRAFFIC_LIMIT_GB:-0}
      - K2_TEST_NODE=${K2_TEST_NODE:-false}
      - K2_HAS_RELAY=${K2_HAS_RELAY:-false}
      - K2_JUMP_PORT_MIN=${K2_JUMP_PORT_MIN:-40000}
      - K2_JUMP_PORT_MAX=${K2_JUMP_PORT_MAX:-40019}
      - K2_NODE_ARCH=${K2_NODE_ARCH:-k2v5}
    healthcheck:
      test: ["CMD", "test", "-f", "/etc/kaitu/.ready"]
      interval: 2s
      timeout: 1s
      retries: 60
      start_period: 5s

  # K2v5 - Go k2v5 tunnel with ECH front door (bridge network)
  # Docker port mapping handles: 443 TCP+UDP + hop ports 40000-40019 UDP -> container 443
  # Routes based on ECH and SNI:
  # - ECH present: k2v5 protocol handled locally (QUIC on UDP 443, TCP-WS on TCP 443)
  # - No ECH, SNI match: forward to k2v4-slave or k2-oc via local_routes (Docker DNS)
  # - Unknown SNI: camouflage reverse proxy to real site
  k2v5:
    image: public.ecr.aws/d6n9t2r2/k2v5:latest
    container_name: k2v5
    restart: unless-stopped
    networks:
      - k2-internal
    depends_on:
      k2-sidecar:
        condition: service_healthy
    ports:
      - "443:443/tcp"
      - "443:443/udp"
      - "40000:443/udp"
      - "40001:443/udp"
      - "40002:443/udp"
      - "40003:443/udp"
      - "40004:443/udp"
      - "40005:443/udp"
      - "40006:443/udp"
      - "40007:443/udp"
      - "40008:443/udp"
      - "40009:443/udp"
      - "40010:443/udp"
      - "40011:443/udp"
      - "40012:443/udp"
      - "40013:443/udp"
      - "40014:443/udp"
      - "40015:443/udp"
      - "40016:443/udp"
      - "40017:443/udp"
      - "40018:443/udp"
      - "40019:443/udp"
    volumes:
      - config:/etc/kaitu:ro
      - k2v5-data:/etc/k2v5
      - ./users:/etc/k2v5/users
    environment:
      - TZ=Asia/Singapore
      - K2_LOG_LEVEL=${K2V5_LOG_LEVEL:-info}
    logging:
      driver: journald
      options:
        tag: k2v5

  # K2v4 Slave - k2v4 protocol (bridge network, behind k2v5 front door)
  # k2v5 forwards non-ECH traffic matching K2_DOMAIN via Docker internal network.
  k2v4-slave:
    image: public.ecr.aws/d6n9t2r2/k2-slave:latest
    container_name: k2v4-slave
    restart: unless-stopped
    networks:
      - k2-internal
    depends_on:
      k2-sidecar:
        condition: service_healthy
    ports:
      - "8443:443"
    volumes:
      - config:/etc/kaitu:ro
    environment:
      - TZ=Asia/Singapore
      - K2_CONFIG_DIR=/etc/kaitu
      - K2_CENTER_URL=${K2_CENTER_URL:-https://k2.52j.me}
      - K2_CENTER_ENABLE=true
      - K2_LOG_LEVEL=${K2_LOG_LEVEL:-info}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # K2 OC Tunnel - OpenConnect protocol (bridge network)
  k2-oc:
    image: public.ecr.aws/d6n9t2r2/k2-oc:latest
    container_name: k2-oc
    restart: unless-stopped
    networks:
      - k2-internal
    privileged: true
    sysctls:
      - net.ipv4.ip_forward=1
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - NET_RAW
    depends_on:
      k2-sidecar:
        condition: service_healthy
    ports:
      - "10001:443"
    volumes:
      - config:/etc/ocserv:ro
    environment:
      - TZ=Asia/Singapore
      - OCSERV_CONFIG=/etc/ocserv/ocserv.conf
      - DEBUG=${DEBUG:-false}
